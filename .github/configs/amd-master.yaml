dsr1-fp8-mi355x-sglang-disagg:
  image: rocm/sgl-dev:sglang-0.5.9-rocm720-mi35x-mori-0227-2
  model: deepseek-ai/DeepSeek-R1-0528
  model-prefix: dsr1
  runner: mi355x-disagg
  precision: fp8
  framework: sglang-disagg
  multinode: true
  disagg: true
  seq-len-configs:
  - isl: 1024
    osl: 1024
    search-space:
    # non-MTP configurations
    # "Top of curve" (1 prefill workers each at DEP8 and 1 decode workers at DEP16)
    - spec-decoding: "none"
      conc-list: [ 1024, 2048 ]
      prefill:
        num-worker: 1
        tp: 8
        ep: 1
        dp-attn: false
        additional-settings:
        - "PREFILL_NODES=1"
      decode:
        num-worker: 1
        tp: 8
        ep: 8
        dp-attn: true
        additional-settings:
        - "DECODE_NODES=2"
        - "DECODE_MTP_SIZE=0"

    # "Middle of curve" (1 prefill workers each at TP8 and 2 decode workers at DEP8)
    - spec-decoding: "none"
      conc-list: [ 1536, 1024, 512 ]
      prefill:
        num-worker: 1
        tp: 8
        ep: 1
        dp-attn: false
        additional-settings:
        - "PREFILL_NODES=1"
      decode:
        num-worker: 2
        tp: 8
        ep: 8
        dp-attn: true
        additional-settings:
        - "DECODE_NODES=2"
        - "DECODE_MTP_SIZE=0"


    # "Bottom of curve" (1 prefill worker at TEP8 and 2 decode workers at TEP8)
    - spec-decoding: "none"
      conc-list: [ 256, 128, 64, 32, 16, 8, 4 ]
      prefill:
        num-worker: 1
        tp: 8
        ep: 1
        dp-attn: false
        additional-settings:
        - "PREFILL_NODES=1"

      decode:
        num-worker: 2
        tp: 8
